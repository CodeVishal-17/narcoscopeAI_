services:
  - type: web
    name: narcoscope-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && python backend/manage.py migrate
    startCommand: gunicorn --chdir backend config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DEBUG
        value: False
      - key: PYTHONUNBUFFERED
        value: 1
